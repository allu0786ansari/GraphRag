version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.prod.yml — Production deployment
#
# Services:
#   backend  — FastAPI (uvicorn, 4 workers, no reload)
#   frontend — nginx serving the pre-built React SPA
#   nginx    — Reverse proxy: /api → backend, / → frontend
#   redis    — Persistent cache
#
# Usage:
#   docker-compose -f docker-compose.prod.yml up --build -d
#   docker-compose -f docker-compose.prod.yml down
#   docker-compose -f docker-compose.prod.yml logs -f nginx
#
# Before deploying:
#   1. Copy .env.example to .env.prod and fill in production values
#   2. Set APP_ENV=production, DEBUG=false, LOG_FORMAT=json
#   3. Use a strong random API_KEY
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── FastAPI backend (production) ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime           # slim runtime image — no build tools
    image: graphrag-backend:prod
    container_name: graphrag-backend-prod
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
      --no-access-log
      --proxy-headers
      --forwarded-allow-ips *
    expose:
      - "8000"                  # exposed to nginx only, not to host
    volumes:
      - ./data:/backend/data
      - backend_logs:/backend/logs
    environment:
      - APP_ENV=production
      - DEBUG=false
      - RELOAD=false
      - LOG_FORMAT=json
      - LOG_LEVEL=INFO
      - DATA_DIR=/backend/data
      - ARTIFACTS_DIR=/backend/data/processed
      - RAW_DATA_DIR=/backend/data/raw
      - EVALUATION_DIR=/backend/data/evaluation
      - FAISS_INDEX_PATH=/backend/data/processed/faiss_index.bin
      - EMBEDDINGS_PATH=/backend/data/processed/embeddings.npy
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── React frontend (nginx static) ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod              # multi-stage: node build → nginx static
      args:
        - VITE_API_BASE_URL=/api   # relative path — nginx proxies /api to backend
    image: graphrag-frontend:prod
    container_name: graphrag-frontend-prod
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: graphrag-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro      # mount SSL certs if available
      - nginx_cache:/var/cache/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Redis (persistent) ────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: graphrag-redis-prod
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
  backend_logs:
    driver: local
  nginx_cache:
    driver: local