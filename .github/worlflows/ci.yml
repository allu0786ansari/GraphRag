name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── Backend: lint ────────────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install ruff black mypy

      - name: Run ruff
        run: cd backend && ruff check app/ tests/

      - name: Check black formatting
        run: cd backend && black --check app/ tests/

      - name: Run mypy
        run: cd backend && mypy app/ --ignore-missing-imports
        continue-on-error: true   # type errors are advisory in CI for now

  # ── Backend: unit tests ───────────────────────────────────────────────────
  backend-test-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    needs: backend-lint

    env:
      # Minimal env so Settings can instantiate without real keys
      API_KEY: test-api-key-ci
      OPENAI_API_KEY: sk-test-00000000000000000000000000000000000000000000000
      APP_ENV: development
      LOG_LEVEL: WARNING
      LOG_FORMAT: text
      RATE_LIMIT_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install production dependencies
        run: pip install -r backend/requirements.txt

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio pytest-cov pytest-mock httpx

      - name: Run unit tests
        run: |
          cd backend && pytest tests/unit/ -v \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --tb=short \
            -x

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: unit
          fail_ci_if_error: false

  # ── Backend: integration tests ────────────────────────────────────────────
  backend-test-integration:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: backend-test-unit

    env:
      API_KEY: test-api-key-ci
      OPENAI_API_KEY: sk-test-00000000000000000000000000000000000000000000000
      APP_ENV: development
      LOG_LEVEL: WARNING
      LOG_FORMAT: text
      RATE_LIMIT_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-mock httpx

      - name: Run integration tests
        run: |
          cd backend && pytest tests/integration/ -v \
            --tb=short \
            -x

  # ── Frontend: lint & build ────────────────────────────────────────────────
  frontend-lint-build:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run ESLint
        run: cd frontend && npm run lint
        continue-on-error: true

      - name: Build production bundle
        run: cd frontend && npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8000
          VITE_API_KEY: ci-test-key
          VITE_APP_TITLE: GraphRAG vs VectorRAG

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  # ── Docker: build check ───────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-test-integration, frontend-lint-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: runtime
          push: false
          tags: graphrag-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: prod
          push: false
          tags: graphrag-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_BASE_URL=/api
            VITE_APP_TITLE=GraphRAG vs VectorRAG